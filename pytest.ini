[pytest]
# ── Test discovery ────────────────────────────────────────────────────────
testpaths        = tests
python_files     = test_*.py
python_classes   = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
    --color=yes

# ── Custom markers ─────────────────────────────────────────────────────────
markers =
    slow: marks tests as slow (run with -m slow)
    integration: marks full pipeline integration tests
    requires_yfinance: needs live internet / yfinance
    requires_arch: needs arch library (GARCH MLE)
    requires_hmmlearn: needs real hmmlearn (not stub)
    requires_xgboost: needs real xgboost (not stub)

# ── Logging ───────────────────────────────────────────────────────────────
log_cli          = false
log_level        = WARNING
